services:

  app:
    image: arav1nddock/nlightn-backend:latest
    container_name: backend_app
    expose:
      - "3000"
    env_file:
      - .env.production
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
